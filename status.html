  <script>
    // Progress Animation (60 seconds)
    function animateProgress() {
      let progress = 0;
      const bar = document.getElementById('progressBar');
      const text = document.getElementById('progressText');
      const timeEl = document.getElementById('timeLeft');

      const timer = setInterval(() => {
        progress += 2;
        bar.style.width = `${progress}%`;
        text.textContent = `${progress}% Complete`;

        const remaining = Math.max(0, Math.floor((100 - progress) * 0.6));
        timeEl.textContent = `Est. Finish: ${remaining} secs`;

        if (progress >= 100) {
          clearInterval(timer);
          timeEl.innerHTML = `<span class="text-green-400">Wash Completed!</span>`;
        }
      }, 1200);
    }

    // Queue Data
    const queueData = [
      { position: 1, car: "Swift Dzire", owner: "Anil Menon", wait: "15 mins" },
      { position: 2, car: "Hyundai Creta", owner: "Priya Sharma", wait: "30 mins" },
      { position: 3, car: "Toyota Fortuner", owner: "Suresh Babu", wait: "45 mins" }
    ];

    function renderQueue() {
      const container = document.getElementById('queue-list');
      container.innerHTML = '';
      queueData.forEach(item => {
        const div = document.createElement('div');
        div.className = "bg-zinc-900 border border-zinc-700 hover:border-red-500/30 rounded-2xl p-6 flex items-center justify-between transition-all";
        div.innerHTML = `
          <div class="flex items-center gap-6">
            <div class="text-4xl font-bold text-zinc-600 w-10">${item.position}</div>
            <div>
              <div class="text-2xl font-semibold">${item.car}</div>
              <div class="text-zinc-400">${item.owner}</div>
            </div>
          </div>
          <div class="text-right">
            <div class="text-red-400 font-medium">${item.wait}</div>
            <div class="text-xs text-zinc-500 mt-1">Waiting</div>
          </div>
        `;
        container.appendChild(div);
      });
    }

    // Initialize
    window.addEventListener('load', () => {
      renderQueue();
      animateProgress();
    });
  </script>
