<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIVE STATUS • GAADIWAALA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body { 
      font-family: 'Inter', system-ui, sans-serif; 
      background: #09090b;
    }

    .nav-link { position: relative; transition: all 0.3s ease; }
    .nav-link:after {
      content: ''; position: absolute; width: 0; height: 2px; bottom: -4px; left: 0;
      background-color: #ff0000; transition: width 0.3s ease;
    }
    .nav-link:hover:after { width: 100%; }
  </style>
</head>
<body class="text-white overflow-x-hidden">

  <!-- Navbar -->
  <nav class="bg-black/90 backdrop-blur-md fixed w-full z-50 border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div>
          <span class="text-2xl font-bold tracking-tighter">GAADI</span>
          <span class="text-2xl font-light tracking-widest text-red-500">WAALA</span>
        </div>
      </div>

      <div class="hidden md:flex items-center gap-10 text-sm font-medium">
        <a href="index.html" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })" class="nav-link">HOME</a>
        <a href="https://www.google.com/maps/dir//GaadiWaala+Car+Wash..." class="nav-link">LOCATION</a>
        <a href="#status-section" class="nav-link">CURRENT STATUS</a>
        <a href="#" class="nav-link">ABOUT</a>
      </div>

      <div class="flex items-center gap-4">
        <button onclick="window.location.href='tel:+918086043225'"
        class="px-6 py-2.5 text-sm font-semibold border border-white/30 hover:border-white transition-colors rounded-full flex items-center gap-2">
          <i class="fa-solid fa-phone"></i><span>CONTACT</span>
        </button>
        <button onclick="openBookingModal()" 
                class="bg-red-600 hover:bg-red-700 transition-colors px-8 py-2.5 rounded-full text-sm font-semibold flex items-center gap-2">
          <i class="fa-solid fa-car"></i> BOOK
        </button>
      </div>
    </div>
  </nav>

  <div class="pt-24 pb-12">
    <div class="max-w-5xl mx-auto px-6">
      <div class="text-center mb-12">
        <div class="inline-flex items-center gap-3 bg-green-500/10 text-green-400 px-6 py-2 rounded-full text-sm font-medium mb-4">
          <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
          LIVE STATUS
        </div>
        <h1 class="text-5xl font-bold tracking-tighter">Car Wash Progress</h1>
      </div>

      <!-- Currently Washing -->
      <div class="bg-zinc-900 border border-red-500/30 rounded-3xl p-10 mb-12">
        <div class="flex items-center gap-4 mb-8">
          <div class="w-5 h-5 bg-green-500 rounded-full animate-pulse"></div>
          <span class="uppercase tracking-[3px] text-sm font-semibold text-green-400">Currently Washing</span>
        </div>
        
        <div class="flex flex-col lg:flex-row gap-10 items-center">
          <div>
            <div class="text-7xl font-bold text-white">INNOVA CRYSTA</div>
            <div class="text-xl text-zinc-400 mt-2">Owner: Mr. Rajesh Kumar</div>
          </div>
          
          <div class="flex-1 w-full max-w-xl">
            <div class="h-5 bg-zinc-800 rounded-2xl overflow-hidden mb-4">
              <div id="progressBar" 
                   class="h-5 bg-gradient-to-r from-red-500 via-orange-500 to-yellow-400 rounded-2xl transition-all duration-1000"
                   style="width: 0%"></div>
            </div>
            <div class="flex justify-between text-sm">
              <span id="progressText" class="font-semibold text-red-400">0% Complete</span>
              <span id="timeLeft" class="text-zinc-400">Est. Finish: 60 secs</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Next in Queue -->
      <div class="mb-8">
        <h3 class="text-2xl font-semibold mb-8 flex items-center gap-3">
          <i class="fa-solid fa-clock"></i> 
          NEXT IN QUEUE
        </h3>
        <div class="space-y-4" id="queue-list"></div>
      </div>
    </div>
  </div>

  <script>
    // Progress Animation (60 seconds)
    function animateProgress() {
      let progress = 0;
      const bar = document.getElementById('progressBar');
      const text = document.getElementById('progressText');
      const timeEl = document.getElementById('timeLeft');

      const timer = setInterval(() => {
        progress += 2;
        bar.style.width = `${progress}%`;
        text.textContent = `${progress}% Complete`;

        const remaining = Math.max(0, Math.floor((100 - progress) * 0.6));
        timeEl.textContent = `Est. Finish: ${remaining} secs`;

        if (progress >= 100) {
          clearInterval(timer);
          timeEl.innerHTML = `<span class="text-green-400">Wash Completed!</span>`;
        }
      }, 1200);
    }

    // Queue Data
    const queueData = [
      { position: 1, car: "Swift Dzire", owner: "Anil Menon", wait: "15 mins" },
      { position: 2, car: "Hyundai Creta", owner: "Priya Sharma", wait: "30 mins" },
      { position: 3, car: "Toyota Fortuner", owner: "Suresh Babu", wait: "45 mins" }
    ];

    function renderQueue() {
      const container = document.getElementById('queue-list');
      container.innerHTML = '';
      queueData.forEach(item => {
        const div = document.createElement('div');
        div.className = "bg-zinc-900 border border-zinc-700 hover:border-red-500/30 rounded-2xl p-6 flex items-center justify-between transition-all";
        div.innerHTML = `
          <div class="flex items-center gap-6">
            <div class="text-4xl font-bold text-zinc-600 w-10">${item.position}</div>
            <div>
              <div class="text-2xl font-semibold">${item.car}</div>
              <div class="text-zinc-400">${item.owner}</div>
            </div>
          </div>
          <div class="text-right">
            <div class="text-red-400 font-medium">${item.wait}</div>
            <div class="text-xs text-zinc-500 mt-1">Waiting</div>
          </div>
        `;
        container.appendChild(div);
      });
    }

    // Initialize
    window.addEventListener('load', () => {
      renderQueue();
      animateProgress();
    });
  </script>
</body>
</html>
