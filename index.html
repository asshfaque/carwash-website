<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAADIWAALA • Carwash</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
   
    .shutter { position: relative; overflow: hidden; }
    .shutter-panel {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(#1f2937 0%, #111827 100%);
      display: flex; flex-direction: column;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
      animation: rollUp 4s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
      z-index: 20;
    }
    .shutter-panel::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, transparent 0px, transparent 8px, rgba(255,255,255,0.08) 8px, rgba(255,255,255,0.08) 12px);
      pointer-events: none;
    }
    @keyframes rollUp { 0% { transform: translateY(0); } 100% { transform: translateY(-100%); } }

    .hero {
      position: relative; min-height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)),
                  url('https://i.pinimg.com/1200x/34/36/72/343672f36e1c13b2bde9799dbbcd7994.jpg') center/cover no-repeat;
    }
    .car { animation: float 50s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-30px); } }

    .nav-link { position: relative; transition: all 0.3s ease; }
    .nav-link:after {
      content: ''; position: absolute; width: 0; height: 2px; bottom: -4px; left: 0;
      background-color: #ff0000; transition: width 0.3s ease;
    }
    .nav-link:hover:after { width: 100%; }
  </style>
</head>
<body class="bg-zinc-950 text-white overflow-x-hidden">

  <!-- Navbar -->
  <nav class="bg-black/90 backdrop-blur-md fixed w-full z-50 border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <span class="text-2xl font-bold tracking-tighter">GAADI</span>
        <span class="text-2xl font-light tracking-widest text-red-500">WAALA</span>
      </div>
      <div class="hidden md:flex items-center gap-10 text-sm font-medium">
        <a href="#" onclick="window.location.reload()" class="nav-link text-red-500">HOME</a>
        <a href="https://www.google.com/maps/dir//GaadiWaala+Car+Wash..." class="nav-link">LOCATION</a>
        <a href="services.html" class="nav-link">SERVICES</a>
        <a href="status.html" class="nav-link">CURRENT STATUS</a>
        <a href="about.html" class="nav-link">ABOUT</a>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="window.location.href='tel:+918606856000'" class="px-5 py-2 text-sm font-semibold border border-white/30 hover:border-white transition-colors rounded-full flex items-center gap-2">
          <i class="fa-solid fa-phone"></i>
          <span class="hidden sm:inline">CONTACT</span>
        </button>
        <button onclick="openBookingModal()" class="bg-red-600 hover:bg-red-700 transition-colors px-6 py-2.5 rounded-full text-sm font-semibold flex items-center gap-2">
          <i class="fa-solid fa-car"></i>
          <span class="hidden sm:inline">BOOK</span>
        </button>
        <button id="hamburger" class="md:hidden text-3xl p-2">
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Shutter + Hero -->
  <div class="shutter pt-16 md:pt-20">
    <div class="shutter-panel">
      <div class="flex-1 flex items-center justify-center">
        <div class="text-center">
          <div class="w-24 h-2 bg-zinc-400 mx-auto mb-8 rounded"></div>
          <div class="text-4xl font-bold tracking-widest text-zinc-400">GAADIWAALA</div>
          <div class="text-zinc-500 text-sm mt-2">PREMIUM CAR WASH</div>
        </div>
      </div>
    </div>

    <div class="hero flex items-center">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 py-12 md:py-0 grid md:grid-cols-2 gap-10 items-center">
        <div class="space-y-6 md:space-y-8">
          <div id="statusBadge" class="inline-flex items-center gap-3 bg-white/10 backdrop-blur-md px-5 py-2 rounded-full text-sm">
            <div id="statusDot" class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
            <span id="statusText">NOW OPEN</span>
          </div>
       
          <h1 class="text-5xl sm:text-6xl md:text-7xl font-bold leading-none tracking-tighter">
            ELEVATE<br>YOUR DRIVE
          </h1>
       
          <p class="text-lg sm:text-xl md:text-2xl text-zinc-400">
            Professional car wash and detailing services for a spotless shine, every time.
          </p>
       
          <div class="flex flex-col sm:flex-row gap-4">
            <button onclick="document.getElementById('car-section').scrollIntoView({ behavior: 'smooth' })"
                    class="bg-white text-black px-8 py-5 rounded-2xl font-semibold flex items-center justify-center gap-3 hover:scale-105 transition-transform">
              VIEW STATUS
              <i class="fa-solid fa-arrow-right"></i>
            </button>
         
            <button onclick="openBookingModal()" class="border border-white/50 hover:bg-white/10 px-8 py-5 rounded-2xl font-medium transition-colors">
              BOOK A CAR WASH
            </button>
          </div>
        </div>

        <div id="car-section" class="relative flex justify-center">
          <div class="relative car">
            <img id="car-image" src="VTPzX.jpg" alt="Luxury Sports Car" class="w-full max-w-md md:max-w-2xl drop-shadow-2xl rounded-3xl">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Booking Modal -->
  <div id="bookingModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-zinc-900 rounded-3xl max-w-md w-full border border-red-500/20 overflow-hidden">
      
      <!-- Modal Header -->
      <div class="flex justify-between items-center border-b border-zinc-800 px-6 py-5">
        <div>
          <h2 class="text-2xl font-bold">Book Your Wash</h2>
          <p class="text-zinc-400 text-sm">GAADIWAALA • Premium Car Care</p>
        </div>
        <button onclick="closeBookingModal()" 
                class="text-4xl leading-none text-zinc-400 hover:text-white transition-colors">×</button>
      </div>

      <!-- Modal Body -->
      <form id="bookingForm" class="p-6 space-y-5">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-zinc-400 mb-1">Full Name</label>
            <input type="text" id="name" required
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:border-red-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-sm text-zinc-400 mb-1">Phone Number</label>
            <input type="tel" id="phone" required
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:border-red-500 focus:outline-none">
          </div>
        </div>

        <div>
          <label class="block text-sm text-zinc-400 mb-1">Email Address</label>
          <input type="email" id="email" required
                 class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:border-red-500 focus:outline-none">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-zinc-400 mb-1">Vehicle No.</label>
            <input type="text" id="vehicleNo" placeholder="KL-08-AB-1234"
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:border-red-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-sm text-zinc-400 mb-1">Vehicle Type</label>
            <select id="vehicleType"
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:border-red-500 focus:outline-none">
              <option value="">Select</option>
              <option>Hatchback</option>
              <option>Sedan</option>
              <option>SUV</option>
              <option>Luxury</option>
              <option>Electric</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-sm text-zinc-400 mb-1">Service Type</label>
          <select id="serviceType" required
                  class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:border-red-500 focus:outline-none">
            <option value="">Choose Service</option>
            <option>Basic Exterior Wash</option>
            <option>Premium Wash + Interior</option>
            <option>Full Detailing</option>
            <option>Ceramic Coating</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-zinc-400 mb-1">Date</label>
            <input type="date" id="date" required
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:border-red-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-sm text-zinc-400 mb-1">Time</label>
            <select id="time" required
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:border-red-500 focus:outline-none">
              <option value="">Select Time</option>
              <option>09:00 AM</option>
              <option>10:00 AM</option>
              <option>11:00 AM</option>
              <option>02:00 PM</option>
              <option>04:00 PM</option>
              <option>06:00 PM</option>
            </select>
          </div>
        </div>

        <button type="submit"
                class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-2xl font-semibold text-base transition-all mt-2">
          CONFIRM BOOKING
        </button>
      </form>
    </div>
  </div>

  <script>
    // Mobile Menu (if you add it later)
    const hamburger = document.getElementById('hamburger');
    hamburger.addEventListener('click', () => {
      alert("Mobile menu coming soon!"); // You can expand this later
    });

    // Dynamic Status
    function updateBusinessStatus() {
      const now = new Date();
      const day = now.getDay();
      const currentMinutes = now.getHours() * 60 + now.getMinutes();
      const openTime = 9 * 60 + 30;   // 9:30 AM
      const closeTime = 19 * 60 + 30; // 7:30 PM

      const isOpen = (day !== 0) && (currentMinutes >= openTime && currentMinutes < closeTime);

      const statusBadge = document.getElementById('statusBadge');
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');

      if (isOpen) {
        statusBadge.className = "inline-flex items-center gap-3 bg-emerald-900/50 backdrop-blur-md px-5 py-2 rounded-full text-sm border border-emerald-500/30";
        statusDot.className = "w-3 h-3 bg-emerald-400 rounded-full animate-pulse";
        statusText.textContent = "NOW OPEN";
        statusText.className = "text-emerald-400 font-medium";
      } else {
        statusBadge.className = "inline-flex items-center gap-3 bg-red-900/50 backdrop-blur-md px-5 py-2 rounded-full text-sm border border-red-500/30";
        statusDot.className = "w-3 h-3 bg-red-400 rounded-full";
        statusText.textContent = "NOW CLOSED";
        statusText.className = "text-red-400 font-medium";
      }
    }

    updateBusinessStatus();
    setInterval(updateBusinessStatus, 60000);

    // Booking Modal
    function openBookingModal() {
      document.getElementById('bookingModal').classList.remove('hidden');
      document.getElementById('bookingModal').classList.add('flex');
    }

    function closeBookingModal() {
      const modal = document.getElementById('bookingModal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    // Form Submission
    document.getElementById('bookingForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert("✅ Booking Received!\n\nThank you! Our team will contact you shortly.");
      closeBookingModal();
      this.reset();
    });

    // Close modal when clicking outside
    document.getElementById('bookingModal').addEventListener('click', function(e) {
      if (e.target === this) closeBookingModal();
    });
  </script>
</body>
</html>
