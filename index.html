    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root {
      --primary: #ff0000;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
    }
    .shutter {
      position: relative;
      overflow: hidden;
    }
    .shutter-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(#1f2937 0%, #111827 100%);
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
      animation: rollUp 4s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
      z-index: 20;
    }
    .shutter-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 8px,
        rgba(255,255,255,0.08) 8px,
        rgba(255,255,255,0.08) 12px
      );
      pointer-events: none;
    }
    @keyframes rollUp {
      0% { transform: translateY(0); }
      100% { transform: translateY(-100%); }
    }
    .hero {
      position: relative;
      min-height:100vh;
      height:auto;
      padding-top:80px;
      padding-bottom:50px;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)), url('https://i.pinimg.com/1200x/34/36/72/343672f36e1c13b2bde9799dbbcd7994.jpg') center/cover no-repeat;
    }
    .car {
      animation: float 50s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-30px); }
    }
   
    .nav-link {
      position: relative;
      transition: all 0.3s ease;
    }
   
    .nav-link:after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: #ff0000;
      transition: width 0.3s ease;
    }
   
    .nav-link:hover:after {
      width: 100%;
    }
    @media (max-width:768px){
      .hero{ min-height:auto; padding-top:100px; padding-bottom:50px; }
      .hero h1{ line-height:0.95; }
      .modal{ width:95%; }
      .shutter-panel .text-4xl{ font-size:2rem; }
    }
  </style>
</head>

  <script>
    // ==================== STATUS LOGIC ====================
    function updateBusinessStatus() {
      const now = new Date();
      const day = now.getDay(); // 0 = Sunday
      const hours = now.getHours();
      const minutes = now.getMinutes();
      
      const currentTimeInMinutes = hours * 60 + minutes;
      const openTime = 9 * 60 + 30;   // 9:30 AM
      const closeTime = 19 * 60 + 30; // 7:30 PM

      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      const statusIndicator = document.getElementById('statusIndicator');

      let isOpen = true;

      if (day === 0) { // Sunday
        isOpen = false;
      } else {
        if (currentTimeInMinutes < openTime || currentTimeInMinutes >= closeTime) {
          isOpen = false;
        }
      }

      if (isOpen) {
        statusDot.className = "w-3 h-3 bg-green-400 rounded-full animate-pulse";
        statusText.textContent = "NOW OPEN";
        statusIndicator.classList.remove('bg-red-500/10');
      } else {
        statusDot.className = "w-3 h-3 bg-red-500 rounded-full";
        statusText.textContent = "NOW CLOSED";
        statusIndicator.classList.add('bg-red-500/10');
      }
    }

    // Run on load and every minute
    window.addEventListener('load', () => {
      updateBusinessStatus();
      setInterval(updateBusinessStatus, 60000);
    });

    // Your existing scripts...
    function openBookingModal() {
      document.getElementById('bookingModal').classList.remove('hidden');
      document.getElementById('bookingModal').classList.add('flex');
    }
    function closeBookingModal() {
      const modal = document.getElementById('bookingModal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    document.getElementById('bookingForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert("✅ Booking Received!\n\nThank you! Our team will contact you shortly.");
      closeBookingModal();
      this.reset();
    });

    document.getElementById('bookingModal').addEventListener('click', function(e) {
      if (e.target === this) closeBookingModal();
    });
  </script>
